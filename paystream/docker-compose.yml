version: '3.9'
 
services:
  # ── PostgreSQL — stores payments, users, transactions, ledger ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: paystream-postgres
    environment:
      POSTGRES_USER: paystream
      POSTGRES_PASSWORD: paystream_local
      POSTGRES_DB: paystream
    ports:

      - "5432:5432"          # host:container — access at localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paystream"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ── MongoDB — stores audit logs and analytics read model ──────────────────
  mongo:
    image: mongo:7-jammy
    container_name: paystream-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: paystream
      MONGO_INITDB_ROOT_PASSWORD: paystream_local
      MONGO_INITDB_DATABASE: paystream_analytics
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
 
  # ── Redis — rate limiter token store, session cache ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: paystream-redis
    command: redis-server --requirepass paystream_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
 
  # ── Zookeeper — required by Kafka (will be removed in newer Kafka versions)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: paystream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
 
  # ── Kafka — event streaming between services ──────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: paystream-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"          # accessible from your laptop as localhost:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
 
  # ── Kafka UI — visual browser for Kafka topics (dev only) ─────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: paystream-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"          # open http://localhost:8090 in browser
    environment:
      KAFKA_CLUSTERS_0_NAME: local

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
 
volumes:
  postgres_data:
  mongo_data:
  redis_data:


